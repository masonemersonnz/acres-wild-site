backend:
  name: git-gateway
  branch: main

media_folder: "images/gallery"
public_folder: "/images/gallery"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Info"
        file: "_data/general.json"
        format: "json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Google Maps Link", name: "maps_link", widget: "string" }
          - { label: "Facebook Link", name: "facebook_link", widget: "string" }

      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        format: "json"
        fields:
          - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
          - { label: "Headline Line 1", name: "headline1", widget: "string" }
          - { label: "Headline Line 2", name: "headline2", widget: "string" }
          - { label: "Headline Line 3 (italic/gold)", name: "headline3", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        format: "json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Paragraph 1", name: "para1", widget: "text" }
          - { label: "Paragraph 2", name: "para2", widget: "text" }
          - { label: "Paragraph 3", name: "para3", widget: "text" }
          - { label: "Hours Detail", name: "hours", widget: "string" }

      - name: "pricing"
        label: "Pricing Section"
        file: "_data/pricing.json"
        format: "json"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - label: "Pricing Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Price Suffix (e.g. –50)", name: "price_suffix", widget: "string", required: false }
              - { label: "Per Line", name: "per", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
          - { label: "Pricing Note", name: "note", widget: "string" }
          - { label: "Ponies for Sale Line", name: "ponies_note", widget: "string" }

      - name: "gallery"
        label: "Gallery"
        file: "_data/gallery.json"
        format: "json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Caption", name: "alt", widget: "string" }

      - name: "hours"
        label: "Opening Hours"
        file: "_data/hours.json"
        format: "json"
        fields:
          - label: "Days"
            name: "days"
            widget: "list"
            fields:
              - { label: "Day(s)", name: "day", widget: "string" }
              - { label: "Hours", name: "time", widget: "string" }
